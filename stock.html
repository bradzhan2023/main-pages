<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球市場即時行情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #06080f;
            color: #f8fafc;
        }
        .market-card {
            background: #131722;
            border: 1px solid #363a45;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 480px;
        }
        .tv-container {
            flex-grow: 1;
            width: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white">全球大盤真實數據</h1>
                <p class="text-slate-500 mt-2">數據來源：Broker CFD (24H 盤前盤後監控)</p>
            </div>
            <div class="text-right text-xs text-slate-500">
                更新日期：2026/03/17
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <!-- 台股替代方案：使用富時台灣指數 (FTSE Taiwan) CFD -->
            <div class="market-card border-blue-500/30">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50 flex justify-between items-center">
                    <h3 class="font-bold text-lg text-blue-400">台股參考行情 (FTSE Taiwan)</h3>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded">24H 走勢參考</span>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-taiwan-cfd" style="height:100%;width:100%"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["台股指數參考", "CAPITALCOM:TAIWAN|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-taiwan-cfd"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <!-- 那斯達克 CFD：更換代碼為 US100 或 NQ100 -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg text-white">那斯達克 100 (Nasdaq 100)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-ndx-cfd-new" style="height:100%;width:100%"></div>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["Nasdaq 100 CFD", "CAPITALCOM:US100|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-ndx-cfd-new"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <!-- S&P 500 CFD -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg text-white">標普 500 (US500)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-spx-cfd" style="height:100%;width:100%"></div>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["S&P 500 CFD", "CAPITALCOM:US500|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-spx-cfd"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <!-- 道瓊 CFD -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg text-white">道瓊工業 (US30)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-dji-cfd" style="height:100%;width:100%"></div>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["Dow 30 CFD", "CAPITALCOM:US30|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-dji-cfd"
                        });
                        </script>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-8 text-center text-slate-600 text-sm">
            本看板採用全球券商 CFD 數據，支援 24 小時行情跳動。若台股依然受限，代表該數據源目前暫停外部圖表輸出。
        </footer>
    </div>
</body>
</html>
