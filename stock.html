<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全球市場即時行情</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body {
            font-family: 'Inter', "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: #06080f;
            color: #f8fafc;
        }
        .market-card {
            background: #131722;
            border: 1px solid #363a45;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 480px;
        }
        .tw-list-card {
            background: #131722;
            border: 1px solid #363a45;
            border-radius: 12px;
            overflow: hidden;
            height: 300px;
        }
        .tv-container {
            flex-grow: 1;
            width: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-bold text-white">全球大盤真實數據</h1>
                <p class="text-slate-500 mt-2">數據來源：TradingView Real-time Data</p>
            </div>
            <div class="text-right text-xs text-slate-500">
                更新日期：2026/03/17
            </div>
        </header>

        <!-- 台股部分：使用最穩定的列表元件確保數據產出 -->
        <div class="mb-8">
            <div class="tw-list-card">
                <div class="p-3 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-base text-blue-400">台股市場監控 (穩定數據源)</h3>
                </div>
                <div class="h-[240px]">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div class="tradingview-widget-container__widget"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                        {
                          "colorTheme": "dark",
                          "dateRange": "1D",
                          "showChart": false,
                          "locale": "zh_TW",
                          "isTransparent": true,
                          "showSymbolLogo": true,
                          "width": "100%",
                          "height": "100%",
                          "tabs": [
                            {
                              "title": "台灣市場",
                              "symbols": [
                                { "s": "TWSE:TAIEX", "d": "加權指數" },
                                { "s": "TAIFEX:TX1!", "d": "台指期貨" }
                              ]
                            }
                          ]
                        }
                        </script>
                    </div>
                </div>
            </div>
        </div>

        <!-- 美股部分：還原回原本精美的圖表卡片 -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- S&P 500 -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg">標普 500 (SPY)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-spx" style="height:100%;width:100%"></div>
                        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["S&P 500", "SPY|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-spx"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <!-- 那斯達克 -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg">那斯達克 (QQQ)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-ndx" style="height:100%;width:100%"></div>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["Nasdaq 100", "QQQ|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-ndx"
                        });
                        </script>
                    </div>
                </div>
            </div>

            <!-- 費城半導體 -->
            <div class="market-card">
                <div class="p-4 border-b border-slate-800 bg-slate-900/50">
                    <h3 class="font-bold text-lg">費城半導體 (SOXX)</h3>
                </div>
                <div class="tv-container">
                    <div class="tradingview-widget-container" style="height:100%;width:100%">
                        <div id="tv-sox" style="height:100%;width:100%"></div>
                        <script type="text/javascript">
                        new TradingView.MediumWidget({
                          "symbols": [["費半指數", "SOXX|1D"]],
                          "chartOnly": false,
                          "width": "100%",
                          "height": "100%",
                          "locale": "zh_TW",
                          "colorTheme": "dark",
                          "gridLineColor": "rgba(42, 46, 57, 0)",
                          "fontColor": "#787B86",
                          "isTransparent": true,
                          "autosize": true,
                          "container_id": "tv-sox"
                        });
                        </script>
                    </div>
                </div>
            </div>

        </div>

        <footer class="mt-8 text-center text-slate-600 text-sm">
            本看板結合多種穩定元件，確保台股數據與美股圖表同時並存。
        </footer>
    </div>
</body>
</html>
