<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>即時市場數據：黃金、比特幣與匯率</title>
    <!-- 載入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 設定 Tailwind 配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans TC', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        /* 調整容器高度以適應 2x2 佈局 */
        .chart-container {
            width: 100%;
            height: 45vh; 
            min-height: 350px;
        }
    </style>
</head>
<body class="bg-gray-100 font-sans p-4">
    <div class="max-w-screen-2xl mx-auto bg-white p-4 sm:p-6 rounded-xl shadow-xl">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-gray-800 tracking-tight">全球資產即時走勢圖</h1>
        </header>

        <!-- 2x2 網格佈局 -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">

            <!-- 1. 黃金 (美元計價) -->
            <div class="chart-container border border-gray-200 rounded-lg shadow overflow-hidden">
                <div class="flex items-center justify-between p-2 bg-yellow-50 border-b border-gray-200">
                    <h2 class="font-bold text-gray-700">黃金 (USD/oz)</h2>
                    <span class="text-xs text-yellow-600">TVC:GOLD</span>
                </div>
                <div class="tradingview-widget-container" style="width: 100%; height: calc(100% - 2.5rem);">
                    <div id="tradingview_gold_usd" style="width: 100%; height: 100%;"></div>
                </div>
            </div>

            <!-- 2. 黃金 (台幣計價/公克) - 使用計算公式修正 -->
            <div class="chart-container border border-gray-200 rounded-lg shadow overflow-hidden">
                <div class="flex items-center justify-between p-2 bg-orange-50 border-b border-gray-200">
                    <h2 class="font-bold text-gray-700">黃金 (TWD/公克)</h2>
                    <span class="text-xs text-orange-600">公式計算 (oz → g)</span>
                </div>
                <div class="tradingview-widget-container" style="width: 100%; height: calc(100% - 2.5rem);">
                    <div id="tradingview_gold_twd" style="width: 100%; height: 100%;"></div>
                </div>
            </div>

            <!-- 3. 比特幣/美金 -->
            <div class="chart-container border border-gray-200 rounded-lg shadow overflow-hidden">
                <div class="flex items-center justify-between p-2 bg-blue-50 border-b border-gray-200">
                    <h2 class="font-bold text-gray-700">比特幣 (BTC/USD)</h2>
                    <span class="text-xs text-blue-600">BINANCE:BTCUSDT</span>
                </div>
                <div class="tradingview-widget-container" style="width: 100%; height: calc(100% - 2.5rem);">
                    <div id="tradingview_btc_usd" style="width: 100%; height: 100%;"></div>
                </div>
            </div>
            
            <!-- 4. 美金/台幣匯率 -->
            <div class="chart-container border border-gray-200 rounded-xl shadow overflow-hidden">
                <div class="flex items-center justify-between p-2 bg-green-50 border-b border-gray-200">
                    <h2 class="font-bold text-gray-700">美金/台幣 (USD/TWD)</h2>
                    <span class="text-xs text-green-600">FX_IDC:USDTWD</span>
                </div>
                <div class="tradingview-widget-container" style="width: 100%; height: calc(100% - 2.5rem);">
                    <div id="tradingview_usd_twd" style="width: 100%; height: 100%;"></div>
                </div>
            </div>

        </div>

        <!-- TradingView 腳本 -->
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
            function initTradingView() {
                if (typeof TradingView !== 'undefined') {
                    const commonConfig = {
                        "width": "100%",
                        "height": "100%",
                        "interval": "D",
                        "timezone": "Asia/Taipei",
                        "theme": "light",
                        "style": "1",
                        "locale": "zh_TW",
                        "enable_publishing": false,
                        "allow_symbol_change": true,
                        "save_image": false,
                        "hide_side_toolbar": true,
                        "withdateranges": true,
                        "range": "YTD"
                    };

                    // 美元黃金 (每盎司)
                    new TradingView.widget({
                        ...commonConfig,
                        "container_id": "tradingview_gold_usd",
                        "symbol": "TVC:GOLD", 
                    });

                    // 台幣黃金 (每公克) 
                    // 公式：(黃金美金價格 / 31.1035) * 美金兌台幣匯率
                    new TradingView.widget({
                        ...commonConfig,
                        "container_id": "tradingview_gold_twd",
                        "symbol": "(TVC:GOLD/31.1035)*FX_IDC:USDTWD", 
                    });

                    // 比特幣
                    new TradingView.widget({
                        ...commonConfig,
                        "container_id": "tradingview_btc_usd",
                        "symbol": "BINANCE:BTCUSDT",
                    });

                    // 美金台幣匯率
                    new TradingView.widget({
                        ...commonConfig,
                        "container_id": "tradingview_usd_twd",
                        "symbol": "FX_IDC:USDTWD",
                    });
                    
                } else {
                    setTimeout(initTradingView, 100);
                }
            }
            window.onload = initTradingView;
        </script>

        <footer class="mt-4 text-center text-xs text-gray-400">
            <p>數據來源：TradingView。台幣黃金採系統公式計算 [(GOLD/31.1035) * USDTWD]。</p>
        </footer>
    </div>
</body>
</html>
